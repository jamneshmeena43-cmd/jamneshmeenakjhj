<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Track Order - Nayan Glass</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <header>
    <div class="logo"><a href="index.html">Nayan Glass Service</a></div>
  </header>
  <div class="container" style="max-width: 600px; margin-top: 40px;">
    <div class="card text-center">
      <h2>Track Your Order</h2>
      <form id="trackForm" style="margin-top:20px;">
        <div class="form-group">
          <input type="text" id="trackId" class="form-control" placeholder="Enter Order ID (e.g. NGS-1024)" required>
        </div>
        <button type="submit" class="btn btn-primary">Track Status</button>
      </form>
    </div>
    <div id="trackResult" style="margin-top: 20px;"></div>
  </div>
  <script src="js/app.js"></script>
</body>
</html>
