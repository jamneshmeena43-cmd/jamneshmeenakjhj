<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Order Glass - Nayan Glass</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <header>
    <div class="logo"><a href="index.html">Nayan Glass Service</a></div>
  </header>

  <div class="container">
    <div class="card" style="max-width: 800px; margin: 0 auto;">
      <h2>Place Your Glass Order</h2>
      <p style="color:var(--text-muted); margin-bottom:20px;">Enter details to get an instant quote.</p>
      
      <form id="orderForm">
        <h3>1. Glass Details</h3>
        <div class="grid-2 form-group">
          <div>
            <label>Glass Shape</label>
            <select id="shape" class="form-control">
              <option value="Rectangle">Rectangle</option>
              <option value="Square">Square</option>
              <option value="Round">Round</option>
            </select>
          </div>
          <div>
            <label>Glass Type</label>
            <select id="glassType" class="form-control">
              <option value="Clear">Clear Glass</option>
              <option value="Toughened">Toughened Glass</option>
              <option value="Mirror">Mirror</option>
              <option value="Frosted">Frosted</option>
            </select>
          </div>
        </div>

        <div id="sizeInputs" class="form-group grid-2">
          <div><label>Width (mm)</label><input type="number" id="width" class="form-control" required></div>
          <div><label>Height (mm)</label><input type="number" id="height" class="form-control" required></div>
        </div>

        <div class="grid-2 form-group">
          <div><label>Thickness</label>
            <select id="thickness" class="form-control">
              <option value="4">4 mm</option>
              <option value="6">6 mm</option>
              <option value="8">8 mm</option>
              <option value="12">12 mm (Tempered)</option>
            </select>
          </div>
          <div><label>Quantity</label><input type="number" id="qty" value="1" min="1" class="form-control"></div>
        </div>

        <div class="card" style="background:var(--bg-color); text-align:center;">
          <h3>Estimated Total</h3>
          <h1 id="estimatedPrice" style="color:var(--secondary); font-size:2.5rem;">₹0.00</h1>
          <p style="font-size:0.9rem; color:var(--text-muted);">Area = (W × H) / 92903.04 sq.ft</p>
        </div>

        <h3>2. Contact Details</h3>
        <div class="grid-2 form-group">
          <div><label>Full Name</label><input type="text" id="custName" class="form-control" required></div>
          <div><label>Phone Number</label><input type="tel" id="custPhone" class="form-control" required></div>
        </div>
        <div class="form-group">
          <label>Delivery Address</label>
          <textarea id="address" class="form-control" rows="3" required></textarea>
        </div>

        <button type="submit" class="btn btn-primary" style="width:100%; font-size:1.2rem;">Confirm Order & Proceed to Pay</button>
      </form>
    </div>
  </div>
  <script src="js/app.js"></script>
</body>
</html>
