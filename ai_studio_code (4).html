<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Shopkeeper Login - Nayan Glass</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <header>
    <div class="logo"><a href="index.html">Nayan Glass Service</a></div>
  </header>
  <div class="container" style="max-width: 400px; margin-top: 60px;">
    <div class="card">
      <h2 style="text-align:center;">Partner Login</h2>
      <form action="admin-dashboard.html" method="GET" style="margin-top:20px;">
        <div class="form-group">
          <label>Email / Phone</label>
          <input type="text" class="form-control" required>
        </div>
        <div class="form-group">
          <label>Password</label>
          <input type="password" class="form-control" required>
        </div>
        <button type="submit" class="btn btn-primary" style="width:100%;">Login to Dashboard</button>
      </form>
      <p style="text-align:center; margin-top: 15px;">New Shop? <a href="#" style="color:var(--primary);">Register Here</a></p>
    </div>
  </div>
</body>
</html>
